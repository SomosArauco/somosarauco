<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Somos Arauco</title>

  <!-- FAVICON -->
<link rel="icon" href="./favicon.png" type="image/png">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      width: 90%;
      max-width: 420px;
    }

    /* LOGO */
   .logo {
  width: 180px;
  margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 25px;
      font-size: 22px;
      color: #2f3b35;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #2e7d5a, #3fae7a);
      transition: all 0.25s ease;
      box-shadow: 0 6px 15px rgba(46, 125, 90, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(46, 125, 90, 0.35);
      background: linear-gradient(135deg, #276b4d, #36a06e);
    }

    .subtitle {
      font-size: 13px;
      color: #6b7a72;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" alt="Logo Somos Arauco" class="logo">

    <h1>Accesos Rápidos</h1>
    <div class="subtitle">Sistema interno de herramientas</div>

    <a class="btn" href="https://somosarauco.github.io/somosarauco/cotizacion.html">
      Cotización
    </a>

    <a class="btn" href="https://somosarauco.github.io/somosarauco/margen.html">
      Margen
    </a>

    <a class="btn" href="https://somosarauco.github.io/somosarauco/facturas.html">
      Chequeo factura
    </a>
  </div>

</body>
</html>
